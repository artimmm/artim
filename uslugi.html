<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nasze Usługi — Serwis Artim</title>
  <link rel="icon" type="image/jpeg" href="icon.jpg">
  <link rel="stylesheet" href="style.css">
  
  <style>
    .services-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 20px;
      align-items: stretch;
    }
    
    @media (min-width: 768px) {
      .services-grid { grid-template-columns: repeat(3, 1fr); }
    }
    @media (min-width: 1200px) {
      .services-grid { grid-template-columns: repeat(5, 1fr); }
    }
    
    .premium-card {
      background: #ffffff;
      border: 1px solid #e2e8f0;
      border-radius: 16px;
      padding: 32px 24px;
      width: 100%;
      box-sizing: border-box;
      display: flex;
      flex-direction: column;
      box-shadow: 0 4px 6px rgba(0, 0, 0, 0.02), 0 10px 15px rgba(0, 0, 0, 0.03);
      transition: transform 0.3s ease, box-shadow 0.3s ease, border-color 0.3s ease;
    }

    .premium-card:hover {
      transform: translateY(-6px);
      box-shadow: 0 12px 25px rgba(0, 0, 0, 0.08);
      border-color: #cbd5e1;
    }

    .premium-card .icon-box {
      width: 56px;
      height: 56px;
      background: #f1f5f9;
      color: #1e3a8a; 
      font-size: 22px;
      font-weight: 800;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 12px;
      margin-bottom: 24px;
    }

    /* Grupa trzymająca tytuł i opis - wymusza równe ustawienie list poniżej */
    .text-group {
      display: block;
    }
    @media (min-width: 1200px) {
      .text-group {
        min-height: 220px; /* Wyrównuje listy do najdłuższego tekstu (Ekspresy) */
      }
    }

    .premium-card h3 {
      font-size: 22px;
      color: #0f172a;
      margin-top: 0;
      margin-bottom: 12px;
      font-weight: 800;
    }
